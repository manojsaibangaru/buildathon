<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aegis AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="icons/icon48.png" alt="logo" class="logo" />
    <h1 class="title">Aegis AI</h1>
  </div>

  <!-- Status Card -->
  <div class="card">
    <div class="row">
      <span class="label">Status</span>
      <div style="display:flex; align-items:center; gap:6px;">
        <span id="status-dot" class="dot dot-inactive"></span>
        <span id="status-text" class="value">Loading...</span>
      </div>
    </div>
    <div class="row" style="margin-top:10px;">
      <span class="label">Platform</span>
      <span id="platform-text" class="value">—</span>
    </div>
  </div>

  <!-- Protection Toggle -->
  <div class="card">
    <div class="row">
      <span class="label">Protection</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-input" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Last Threat Card -->
  <div class="card" id="last-threat-card" style="display:none;">
    <div class="label" style="margin-bottom:10px;">LAST THREAT BLOCKED</div>
    <div class="threat-level" id="threat-level-text">—</div>
    <div id="last-findings" class="findings-list"></div>
    <div class="threat-time" id="threat-time">—</div>
  </div>

  <!-- No threats yet -->
  <div class="card" id="no-threat-card">
    <div style="text-align:center; padding:6px 0; color:#555; font-size:12px;">
      No threats detected yet
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">Aegis AI v1.0 — Protecting your prompts</div>

  <script src="popup.js"></script>
</body>
</html>
